<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>

<button onclick="run()">テスト</button>

<script>
async function run(){
  await liff.init({ liffId: "ここにLIFF_ID" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  alert(profile.userId);
}
</script>

</body>
</html>
