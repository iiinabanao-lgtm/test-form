
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f6f8;
      margin: 0;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 420px;
      margin: 0 auto;
    }

    h3 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 18px;
    }

    label {
      font-size: 13px;
      color: #555;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #06c755;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
    }

    button:disabled {
      background: #ccc;
    }

    .note {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h3>イベント申込</h3>

  <label>イベント</label>
  <select id="event">
    <option value="A001">ストレッチ教室</option>
    <option value="A002">韓国語講座</option>
    <option value="A003">ウクレレ講座</option>
  </select>

  <label>名前</label>
  <input type="text" id="name" placeholder="例：山田太郎">

  <label>電話番号</label>
  <input type="tel" id="tel" placeholder="例：09012345678">

  <button id="submitBtn" onclick="submitForm()" disabled>
    送信する
  </button>

  <div class="note">
    ※この申込内容は公式LINEに送信されます
  </div>
</div>

<script>
let liffReady = false;

async function init() {
  await liff.init({ liffId: "2009964671-Wet32u7g" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  liffReady = true;
  document.getElementById("submitBtn").disabled = false;
}

init();

async function submitForm() {
  if (!liffReady) return;

  const event = document.getElementById("event").value;
  const name = document.getElementById("name").value.trim();
  const tel = document.getElementById("tel").value.trim();

  if (!name || !tel) {
    alert("未入力があります");
    return;
  }

  const message =
`【イベント申込】
イベントID: ${event}
名前: ${name}
電話: ${tel}`;

  try {
    await liff.sendMessages([
      { type: "text", text: message }
    ]);

    alert("送信しました");
    liff.closeWindow();

  } catch (e) {
    alert("送信に失敗しました");
    console.error(e);
  }
}
</script>

</body>
</html>
