
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <style>
    body {
      font-family: sans-serif;
      background: #f5f6f8;
      margin: 0;
      padding: 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      max-width: 420px;
      margin: 0 auto;
    }

    h3 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 18px;
    }

    label {
      font-size: 13px;
      color: #555;
    }

    select, input {
      width: 100%;
      padding: 10px;
      margin-top: 6px;
      margin-bottom: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #06c755;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
    }

    button:disabled {
      background: #ccc;
    }

    .note {
      font-size: 11px;
      color: #888;
      text-align: center;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="card">
  <h3>ハーモニープラザ分館イベント申込</h3>

  <label>イベント</label>
  <select id="event">
    <option value="A001">ボディケアストレッチ教室　第１・３火</option>
    <option value="A002">ボディケアストレッチ教室　第２・４火</option>
    <option value="A003">ウクレレ講座</option>
  </select>

　<label>開催月</label><br>
　<select id="month">
      <option value="2026-06">2026年6月</option>
      <option value="2026-07">2026年7月</option>
      <option value="2026-08">2026年8月</option>
　</select>
    
  <label>名前</label>
  <input type="text" id="name" placeholder="例：山田太郎">

  <label>電話番号</label>
  <input type="tel" id="tel" placeholder="例：09012345678">

  <button id="submitBtn" onclick="submitForm()" disabled>
    送信する
  </button>

  <div class="note">
    ※この申込内容は公式LINEに送信されます
  </div>
</div>

<script>
let liffReady = false;

async function init() {
  await liff.init({ liffId: "2009964671-Wet32u7g" });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  liffReady = true;
  document.getElementById("submitBtn").disabled = false;
}

init();

async function submitForm() {
  if (!liffReady) return;

  const profile = await liff.getProfile();
  const userId = profile.userId;

  const eventSelect = document.getElementById("event");

  const event = eventSelect.value;
  const eventName = eventSelect.options[eventSelect.selectedIndex].text;

  const month = document.getElementById("month").value;
  const name = document.getElementById("name").value.trim();
  const tel = document.getElementById("tel").value.trim();

  if (!name || !tel) {
    alert("未入力があります");
    return;
  }

  const payload = {
    userId,
    event,
    eventName,
    month,
    name,
    tel
  };

  try {
    /* ① スプレッドシート保存 */
    await fetch("https://script.google.com/macros/s/AKfycbybINhWhQWGDPWd3MV4krgVq-5lsjFCSRuPvcjuQ12tdhWVXqUqRjBW63wfqfahJ1Y/exec", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    /* ② LINE送信 */
    const message =
`【イベント申込】
以下の通り申込を受け付けました。
イベントID: ${event}
イベント名: ${eventName}
開催月: ${month}
名前: ${name}
電話: ${tel}`;

    await liff.sendMessages([
      { type: "text", text: message }
    ]);

    alert("申込完了しました");
    liff.closeWindow();

  } catch (e) {
    alert("送信に失敗しました");
    console.error(e);
  }
}
</script>

</body>
</html>
